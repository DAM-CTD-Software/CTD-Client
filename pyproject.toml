[project]
name = "ctdclient"
authors = [
    { name = "Emil Michels", email = "<emil.michels@io-warnemuende.de>" },
]
version = "1.7.11"
description = ""
readme = "README.md"

[tool.poetry.dependencies]
python = ">=3.12, <3.13"
ctd-processing = ">=1.2.3"
seabirdfilehandler = ">=0.3.13"
tomlkit = ">=0.12.3"
xmltodict = ">=0.13.0"
requests = ">=2.31.0"
customtkinter = ">=5.2.2"
ctkmessagebox = ">=2.5"
ctklistbox = ">=1.4"
psutil = ">=5.9.8"
tufup = ">=0.9.0"
geopandas = ">=1.0.1"

[tool.poetry.group.install.dependencies]
pyinstaller = ">=6.7.0"

[tool.poetry.group.dev.dependencies]
pytest = ">=7.4.4"
pytest-mock = ">=3.14.0"
pytest-cov = ">=6.0.0"
sphinx = ">=7.2.6"
sphinx-rtd-theme = ">=2.0.0"
sphinx-autodoc-typehints = ">=1.25.2"
myst-parser = ">=4.0.0"
pyment = ">=0.3.3"
twine = ">=4.0.2"
pre-commit = ">=3.6.0"

[tool.pytest.ini_options]
addopts = '--cov=ctdclient.model --log-format="%(asctime)s %(levelname)s %(message)s" --log-date-format="%Y-%m-%d %H:%M:%S"'
filterwarnings = [
    "error",
    "ignore::UserWarning",
    # note the use of single quote below to denote "raw" strings in TOML
    'ignore: datetime.datetime.utcfromtimestamp\(\) is deprecated:DeprecationWarning',
]

[tool.ruff]
line-length = 79
exclude = ["tests", '__init__.py']

[tool.ruff.lint]
ignore = ["F403", "F821"]

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
