name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    if: "!contains(github.event.head_commit.message, 'python-semantic-release')"
    name: Semantic Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7.3.1
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          uv sync --all-extras
          uv pip install python-semantic-release

      - name: Python Semantic Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          uv run semantic-release -v version --changelog
          uv run semantic-release -v publish

      - name: Build docs
        if: "contains(github.event.head_commit.message, 'docs')"
        run: |
          mkdir docs/build/docs/ -p
          cp docs/images docs/build/docs -r
          uv run sphinx-apidoc -feo docs/source src/ctdclient
          uv run sphinx-build -b html docs/source docs/build

      - name: Deploy to gh-pages
        if: "contains(github.event.head_commit.message, 'docs')"
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/build
          publish_branch: gh-pages

      - name: Check if dist files exist
        id: check_dist
        run: |
          if [ -d "dist" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

  build_binary:
    needs: release
    if: needs.release.outputs.exists == 'true'
    runs-on: batonogov/pyinstaller-windows:v4.11.1
    steps:
      - name: Install missing dependencies
        run: apt update && apt install -y nodejs curl git jq

      - uses: actions/checkout@v6

      - name: Install python dependencies
        run: |
          python -m pip install --upgrade pip
          pip download gsw==3.6.19 --platform win_amd64 --python-version 3.12 --only-binary :all:
          mv gsw-3.6.19-cp312-cp312-win_amd64.whl gsw-3.6.19-cp313-cp313-win_amd64.whl
          pip install gsw-3.6.19-cp313-cp313-win_amd64.whl
          pip install -r requirements.txt

      - name: Build Windows binary
        run: |
          git fetch
          git branch -f pages origin/gh-pages
          git checkout pages :
          mkdir /htmls
          cp -rt /htmls *.html *.inv *.js _static _sources _images
          ./generate_rc_file.sh
          pyinstaller -y windows.spec

      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/ctdclient.exe
          asset_name: ctdclient.exe
          overwrite: true
