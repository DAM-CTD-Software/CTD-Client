repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml

-   repo: https://github.com/python-poetry/poetry
    rev: '1.7.0'  # add version here
    hooks:
    -   id: poetry-check
      # -   id: poetry-lock
      # -   id: poetry-export
