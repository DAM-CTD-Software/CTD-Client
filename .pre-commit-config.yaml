fail_fast: true

repos:
-   repo: https://git.io-warnemuende.de/michels/my-hooks
    rev: 0.0.7
    hooks:
    -   id: black-formatter
    -   id: export-requirements
    -   id: poetry-version-bump
    -   id: poetry-build
    -   id: upload-package
    -   id: update-sphinx-doc
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
-   repo: https://github.com/python-poetry/poetry
    rev: '1.7.0'
    hooks:
    -   id: poetry-check
      #-   id: poetry-lock
    -   id: poetry-export
