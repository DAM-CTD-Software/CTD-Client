fail_fast: true

repos:
-   repo: https://github.com/asottile/reorder-python-imports
    rev: v3.13.0
    hooks:
    -   id: reorder-python-imports
-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.2
    hooks:
    -   id: ruff
        args: [ --fix ]
    -   id: ruff-format
-   repo: https://github.com/python-poetry/poetry
    rev: 2.1.2
    hooks:
    -   id: poetry-check
        stages: [pre-push]
    -   id: poetry-lock
        stages: [pre-push]
-   repo: https://git.io-warnemuende.de/michels/my-hooks
    rev: 0.0.9
    hooks:
    -   id: export-requirements
        stages: [pre-push]
