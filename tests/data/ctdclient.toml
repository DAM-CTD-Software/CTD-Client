# base configuration for the software internals and system specifics which are
# usually set only once during the software installation process
platforms = ['CTD', 'pCTD', 'sfCTD']
number_of_bottles = 13

[paths]
seasave_exe = "C:\\Program Files (x86)\\Sea-Bird\\SeasaveV7\\Seasave.exe"
processing_exes = "C:\\Program Files (x86)\\Sea-Bird\\SBEDataProcessing-Win32"

[dship]
ip='192.168.236.60'
# timeout between individual API calls in seconds
fetch_intervall = 1

    [dship.identifier]
    Cruise = 'SYS.DISP.ExpNumber'
    Station = 'ActionLog.PUP.DopName'
    GPS_Time = 'SYS.DISP.TimeTxt'
    GPS_Lat = 'SYS.STR.PosLat'
    GPS_Lon = 'SYS.STR.PosLon'
    Echo_Depth = 'SYS.CALC.WaterDepth'
    Air_Pressure = 'Weatherstation_DWD.PEUMA.Air_pressure'
    Pos_Alias = 'Web.PUP.NextWPName'

[history]
last_cast = 12
last_filename = "D:\\mig\\tests\\data\\out\\EMB337_091-12_CTD_0012.hex"
last_platform = "CTD"

# configuration that can be changed via the software interface by any operator
[user]

    [user.paths]
    output_directory = "D:\\mig\\tests\\data\\out"
    xmlcon = "D:\\mig\\tests\\data\\EMB295_003-01_CTD_0003.XMLCON"
    seasave_psa = "D:\\mig\\tests\\data\\Seasave_test.psa"

    [user.processing]
    # one of Own, Canadian or WindowsBatch
    type = "WindowsBatch"
    batch_path = "D:\\mig\\tests\\data\\processing_batch.bat"
    psa_directory = "D:\\mig\\tests\\data\\psas"
    modules = ["DatCnv", "AirPressure", "WildEdit", "W_Filter", "AlignCTD", "CellTM", "Derive", "BinAvg"]

    [user.operators]
    op1 = "Heene"
    op2 = "Kolbe"
    op3 = "Faber"
    op4 = "Ruickoldt"
    op5 = "Michels"
    op6 = "Koehn"
    op7 = "Mars"
    last = "Ruickoldt"
